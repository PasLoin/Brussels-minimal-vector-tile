name: Build & Deploy PMTiles

on:
  push:
    branches: [main]
    paths-ignore:
      - 'www/*.pmtiles.gz'
      - 'sizepmtiles.md'
      - 'brussels_capital_region-latest.osm.pbf'
  workflow_dispatch:
  schedule:
    - cron: '0 3 1 * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install osmium & tippecanoe
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq osmium-tool build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          cd /tmp/tippecanoe && make -j$(nproc) && sudo make install

      - name: Download Brussels OSM extract
        run: |
          set -e
          success=false
          for i in 1 2 3; do
            echo "Tentative $i/3..."
            if wget --tries=3 --timeout=60 -nv \
              https://download.openstreetmap.fr/extracts/europe/belgium/brussels_capital_region-latest.osm.pbf; then
              success=true
              break
            fi
            echo "Échec, nouvelle tentative dans 10s..."
            rm -f brussels_capital_region-latest.osm.pbf
            sleep 10
          done
          if [ "$success" = false ]; then
            echo "::error::Impossible de télécharger le fichier OSM après 3 tentatives"
            exit 1
          fi
          file brussels_capital_region-latest.osm.pbf
          ls -lh brussels_capital_region-latest.osm.pbf

      - name: Check PBF freshness
        run: |
          echo "=== Downloaded PBF ==="
          md5sum brussels_capital_region-latest.osm.pbf
          ls -lh brussels_capital_region-latest.osm.pbf
          echo "=== Repo PBF ==="
          git show HEAD:brussels_capital_region-latest.osm.pbf | md5sum || echo "Not yet in repo"


      - name: Check PBF freshness2
        run: |
          echo "=== Downloaded PBF ==="
          md5sum brussels_capital_region-latest.osm.pbf
          ls -lh brussels_capital_region-latest.osm.pbf
          osmium fileinfo brussels_capital_region-latest.osm.pbf
          echo "=== Repo PBF ==="
          git show HEAD:brussels_capital_region-latest.osm.pbf > /tmp/repo.pbf 2>/dev/null \
            && md5sum /tmp/repo.pbf \
            && osmium fileinfo /tmp/repo.pbf \
            || echo "Not yet in repo2"
          

      - name: Extract GeoJSON layers
        run: bash generate_json.bash

      - name: Generate POI icon mapping
        run: python3 generate_poi_icons.py

      - name: Merge touching buildings
        run: |
          pip install shapely --break-system-packages -q
          python3 merge_buildings.py

      - name: Generate PMTiles
        run: bash generate_pmtiles.bash

      - name: Ensure pitch sport layers in style
        run: python3 patch_style_pitches.py www/style.json

      - name: Commit artifacts to repo
        run: |
          cp *.pmtiles.gz www/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f www/*.pmtiles.gz www/poi-icons.json missing-icons.txt sizepmtiles.md brussels_capital_region-latest.osm.pbf
          if git diff --cached --quiet; then
            echo "Pas de changements à commiter"
          else
            git commit -m "chore: update pmtiles, poi-icons and report [skip ci]"
            git push
          fi

      - name: Prepare site
        run: |
          cp -r www/ _site/
          cp -f *.geojson _site/ 2>/dev/null || true
          cp -f sizepmtiles.md _site/ 2>/dev/null || true
          echo "Site pret :"
          ls -lh _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
