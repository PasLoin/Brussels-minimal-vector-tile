name: Build & Deploy PMTiles

on:
  push:
    branches: [main]
    paths-ignore:
      - 'www/brussels.pmtiles.gz'
  workflow_dispatch:
  schedule:
    - cron: '0 3 1 * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install osmium & tippecanoe
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq osmium-tool build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          cd /tmp/tippecanoe && make -j$(nproc) && sudo make install

      - name: Download Brussels OSM extract
        run: |
          for i in 1 2 3; do
            echo "Tentative $i/3..."
            wget --tries=3 --timeout=60 -nv \
              https://download.openstreetmap.fr/extracts/europe/belgium/brussels_capital_region-latest.osm.pbf \
              && break
            echo "Échec, nouvelle tentative dans 10s..."
            rm -f brussels_capital_region-latest.osm.pbf
            sleep 10
          done
          file brussels_capital_region-latest.osm.pbf
          ls -lh brussels_capital_region-latest.osm.pbf

      - name: Extract GeoJSON layers
        run: bash generate_json.bash

      - name: Merge touching buildings
        run: |
          pip install shapely --break-system-packages -q
          python3 merge_buildings.py

      - name: Generate PMTiles
        run: bash generate_pmtiles.bash

      - name: Commit PMTiles to www/
        run: |
          cp brussels.pmtiles.gz www/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add www/brussels.pmtiles.gz
          if git diff --cached --quiet; then
            echo "PMTiles inchangé, pas de commit"
          else
            git commit -m "chore: update brussels.pmtiles.gz [skip ci]"
            git push
          fi

      - name: Prepare site
        run: |
          cp -r www/ _site/
          cp -f *.geojson _site/ 2>/dev/null || true
          echo "✓ Site prêt :"
          ls -lh _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
