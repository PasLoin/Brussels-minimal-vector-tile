name: Tests

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ═══════════════════════════════════════════════════════
  # Tests Unitaires (Vitest + jsdom)
  # ═══════════════════════════════════════════════════════
  unit-tests:
    name: Tests Unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test -- --reporter=default --reporter=junit

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/unit-results.xml
          retention-days: 30

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### 📊 Coverage" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat coverage/coverage-summary.json | jq '.total' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ═══════════════════════════════════════════════════════
  # Tests E2E (Playwright — Chromium uniquement)
  # ═══════════════════════════════════════════════════════
  e2e-tests:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --reporter=list,junit,html
        env:
          CI: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 30

      - name: Upload failure screenshots & videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            test-results/**/*.png
            test-results/**/*.webm
          retention-days: 14

  # ═══════════════════════════════════════════════════════
  # Rapport sur la PR + Step Summary
  # ═══════════════════════════════════════════════════════
  test-report:
    name: Rapport de tests
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/

      - name: Parse unit test results
        id: unit
        if: always()
        run: |
          XML="all-results/unit-test-results/unit-results.xml"
          if [ -f "$XML" ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' "$XML" | head -1 || echo "?")
            FAILURES=$(grep -oP 'failures="\K[0-9]+' "$XML" | head -1 || echo "?")
            echo "tests=$TESTS" >> $GITHUB_OUTPUT
            echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          else
            echo "tests=?" >> $GITHUB_OUTPUT
            echo "failures=?" >> $GITHUB_OUTPUT
          fi

      - name: Parse E2E test results
        id: e2e
        if: always()
        run: |
          XML="all-results/e2e-test-results/e2e-results.xml"
          if [ -f "$XML" ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' "$XML" | head -1 || echo "?")
            FAILURES=$(grep -oP 'failures="\K[0-9]+' "$XML" | head -1 || echo "?")
            echo "tests=$TESTS" >> $GITHUB_OUTPUT
            echo "failures=$FAILURES" >> $GITHUB_OUTPUT
          else
            echo "tests=?" >> $GITHUB_OUTPUT
            echo "failures=?" >> $GITHUB_OUTPUT
          fi

      - name: Generate summary & PR comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-report
          message: |
            ## 🧪 Rapport de tests

            | Suite | Statut | Tests | Échecs |
            |-------|--------|-------|--------|
            | Unitaires (Vitest) | ${{ needs.unit-tests.result == 'success' && '✅' || '❌' }} | ${{ steps.unit.outputs.tests }} | ${{ steps.unit.outputs.failures }} |
            | E2E (Playwright) | ${{ needs.e2e-tests.result == 'success' && '✅' || '❌' }} | ${{ steps.e2e.outputs.tests }} | ${{ steps.e2e.outputs.failures }} |

            📦 Rapports détaillés dans les **Artifacts** du [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

      - name: Step summary (push & dispatch)
        if: always()
        run: |
          UNIT_ICON="${{ needs.unit-tests.result == 'success' && '✅' || '❌' }}"
          E2E_ICON="${{ needs.e2e-tests.result == 'success' && '✅' || '❌' }}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🧪 Rapport de tests

          | Suite | Statut | Tests | Échecs |
          |-------|--------|-------|--------|
          | Unitaires (Vitest) | $UNIT_ICON | ${{ steps.unit.outputs.tests }} | ${{ steps.unit.outputs.failures }} |
          | E2E (Playwright) | $E2E_ICON | ${{ steps.e2e.outputs.tests }} | ${{ steps.e2e.outputs.failures }} |

          📦 Rapports détaillés dans les **Artifacts** ci-dessus.
          EOF
