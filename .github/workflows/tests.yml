name: Tests

on:
  # Sur chaque pull request
  pull_request:
    branches: [main, master]
  # Au push sur la branche principale
  push:
    branches: [main, master]
  # À la demande (bouton dans l'UI GitHub)
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════
  # Tests Unitaires (Vitest + jsdom)
  # ═══════════════════════════════════════════════════════
  unit-tests:
    name: Tests Unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test -- --reporter=default --reporter=junit

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/unit-results.xml
          retention-days: 30

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat coverage/coverage-summary.json | jq '.total' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  # ═══════════════════════════════════════════════════════
  # Tests E2E (Playwright)
  # ═══════════════════════════════════════════════════════
  e2e-tests:
    name: Tests E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Verify www/ directory structure
        run: |
          echo "### www/ directory" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la www/ >> $GITHUB_STEP_SUMMARY 2>&1 || echo "www/ not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run E2E tests
        run: npx playwright test --reporter=list,junit,html
        env:
          CI: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 30

      - name: Upload screenshots & videos (failures)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            test-results/**/*.png
            test-results/**/*.webm
          retention-days: 14

  # ═══════════════════════════════════════════════════════
  # Rapport consolidé
  # ═══════════════════════════════════════════════════════
  test-summary:
    name: Rapport de tests
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/

      - name: Generate summary
        run: |
          echo "## 🧪 Rapport de tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.unit-tests.result }}" = "success" ]; then
            echo "| Tests Unitaires | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Tests Unitaires | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.e2e-tests.result }}" = "success" ]; then
            echo "| Tests E2E | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Tests E2E | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Rapports disponibles dans les **Artifacts** de ce workflow." >> $GITHUB_STEP_SUMMARY
