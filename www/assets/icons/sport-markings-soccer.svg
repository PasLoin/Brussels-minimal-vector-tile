<svg xmlns="http://www.w3.org/2000/svg" width="200" height="130"
     viewBox="0 0 200 130">
  <!--
    Terrain de football — 105 m × 68 m
    Échelle : s = 200/105 ≈ 1.905 unités/m
    Stroke blanc sur fond transparent.
  -->
  <g fill="none" stroke="#fff" stroke-width="1.2" stroke-linecap="square">

    <!-- Limites du terrain -->
    <rect x="1" y="1" width="198" height="128"/>

    <!-- Ligne médiane -->
    <line x1="100" y1="1" x2="100" y2="129"/>

    <!-- Rond central (r = 9.15 m → 17.4) -->
    <circle cx="100" cy="65" r="17.4"/>

    <!-- Point central -->
    <circle cx="100" cy="65" r="1.2" fill="#fff" stroke="none"/>

    <!-- ─── Côté gauche ─── -->

    <!-- Surface de réparation (16.5 m × 40.32 m → 31.4 × 76.8) -->
    <rect x="1" y="26.6" width="31.4" height="76.8"/>

    <!-- Surface de but (5.5 m × 18.32 m → 10.5 × 34.9) -->
    <rect x="1" y="47.5" width="10.5" height="35"/>

    <!-- Point de penalty (11 m → 21) -->
    <circle cx="22" cy="65" r="1.2" fill="#fff" stroke="none"/>

    <!-- Arc de réparation (r = 17.4, hors surface) -->
    <path d="M 32.4 51 A 17.4 17.4 0 0 1 32.4 79"/>

    <!-- ─── Côté droit ─── -->

    <!-- Surface de réparation -->
    <rect x="167.6" y="26.6" width="31.4" height="76.8"/>

    <!-- Surface de but -->
    <rect x="188.5" y="47.5" width="10.5" height="35"/>

    <!-- Point de penalty -->
    <circle cx="178" cy="65" r="1.2" fill="#fff" stroke="none"/>

    <!-- Arc de réparation -->
    <path d="M 167.6 51 A 17.4 17.4 0 0 0 167.6 79"/>

    <!-- ─── Arcs de coin (r = 1 m → 1.9) ─── -->
    <path d="M 2.9 1 A 1.9 1.9 0 0 0 1 2.9"/>
    <path d="M 1 127.1 A 1.9 1.9 0 0 0 2.9 129"/>
    <path d="M 197.1 1 A 1.9 1.9 0 0 1 199 2.9"/>
    <path d="M 199 127.1 A 1.9 1.9 0 0 1 197.1 129"/>

  </g>
</svg>
