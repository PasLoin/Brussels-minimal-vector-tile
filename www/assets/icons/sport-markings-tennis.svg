<svg xmlns="http://www.w3.org/2000/svg" width="200" height="92"
     viewBox="0 0 200 92">
  <!--
    Tennis court (doubles) — 23.77 m × 10.97 m
    Échelle : 1 unité ≈ 0.119 m (200 / 23.77)
    Stroke blanc sur fond transparent, à superposer sur fill vert.
  -->
  <g fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="square">

    <!-- Limites du court (doubles) -->
    <rect x="1" y="1" width="198" height="90" rx="0"/>

    <!-- Lignes de simple (1.37 m du bord = 11.5 unités) -->
    <line x1="1" y1="12.5" x2="199" y2="12.5"/>
    <line x1="1" y1="79.5" x2="199" y2="79.5"/>

    <!-- Filet (centre) -->
    <line x1="100" y1="0" x2="100" y2="92" stroke-width="0.8" stroke-dasharray="3,2"/>

    <!-- Lignes de service (6.40 m du filet = 53.8 unités du centre) -->
    <line x1="46" y1="12.5" x2="46" y2="79.5"/>
    <line x1="154" y1="12.5" x2="154" y2="79.5"/>

    <!-- Ligne centrale de service -->
    <line x1="46" y1="46" x2="154" y2="46"/>

    <!-- Marques centrales sur les lignes de fond -->
    <line x1="1" y1="43" x2="1" y2="49" stroke-width="2"/>
    <line x1="199" y1="43" x2="199" y2="49" stroke-width="2"/>

  </g>
</svg>
