<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brussels — carte minimale</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', system-ui, sans-serif; background: #f5f3ef; }
    #map { position: absolute; inset: 0; }

    /* ── Titre ── */
    .title {
      position: absolute; top: 16px; left: 16px; z-index: 5;
      background: rgba(245, 243, 239, 0.92);
      backdrop-filter: blur(8px);
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.06);
    }
    .title h1 {
      font-size: 13px; font-weight: 500; color: #3a352e;
      letter-spacing: 0.04em;
    }
    .title p {
      font-size: 10px; color: #9a9389; margin-top: 2px;
      letter-spacing: 0.02em;
    }

    /* ── Légende ── */
    .legend {
      position: absolute; bottom: 24px; left: 16px; z-index: 5;
      background: rgba(245, 243, 239, 0.92);
      backdrop-filter: blur(8px);
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.06);
    }
    .legend-row {
      display: flex; align-items: center; gap: 8px;
      padding: 3px 0; cursor: pointer; user-select: none;
      transition: opacity 0.15s;
    }
    .legend-row.off { opacity: 0.3; }
    .legend-row .swatch {
      width: 14px; height: 3px; border-radius: 1px; flex-shrink: 0;
    }
    .legend-row .swatch.fill {
      height: 10px; width: 12px; border-radius: 2px;
    }
    .legend-row span {
      font-size: 10.5px; color: #5a5349; letter-spacing: 0.01em;
    }

    /* ── Contrôles MapLibre ── */
    .maplibregl-ctrl-group { border-radius: 6px !important; border: 1px solid rgba(0,0,0,0.06) !important; box-shadow: none !important; }
    .maplibregl-ctrl-group button { width: 30px !important; height: 30px !important; }
    .maplibregl-ctrl-attrib { font-size: 9px !important; }
  </style>
</head>
<body>

<div id="map"></div>

<div class="title">
  <h1>Bruxelles</h1>
  <p>Tuiles vectorielles · OpenStreetMap</p>
</div>

<div class="legend" id="legend"></div>

<script>
/* ── PMTiles ── */
const protocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', protocol.tile.bind(protocol));

/* ── Couches & légende ── */
const GROUPS = [
  { label: 'Occupation du sol', color: '#eae6e0', type: 'fill', layers: ['landuse-residential','landuse-industrial'] },
  { label: 'Espaces verts',     color: '#d5e3c8', type: 'fill', layers: ['green-fill'] },
  { label: 'Eau',               color: '#c4d8e8', type: 'fill', layers: ['water-fill','water-line'] },
  { label: 'Bâtiments',         color: '#e0dbd3', type: 'fill', layers: ['buildings','buildings-outline'] },
  { label: 'Voirie',            color: '#a09888', type: 'line', layers: ['roads-service','roads-minor','roads-tertiary','roads-secondary','roads-primary','road-labels'] },
  { label: 'Limites',           color: '#b0a898', type: 'line', layers: ['boundaries'] },
];

/* ── Charger le style et patcher les URLs PMTiles ── */
fetch('./style.json')
  .then(r => r.json())
  .then(style => {
    for (const [name, src] of Object.entries(style.sources)) {
      if (src.url && src.url.endsWith('.pmtiles.gz')) {
        src.url = 'pmtiles://' + new URL(src.url, location.href).href;
      }
    }
    initMap(style);
  })
  .catch(err => {
    console.error('Impossible de charger style.json:', err);
    document.querySelector('.title p').textContent = 'Erreur de chargement du style';
  });

function initMap(style) {
  const map = new maplibregl.Map({
    container: 'map',
    style,
    center: [4.3517, 50.8503],
    zoom: 13,
    hash: true,
    maxZoom: 18,
    minZoom: 10,
  });

  map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');
  map.addControl(new maplibregl.ScaleControl({ maxWidth: 100, unit: 'metric' }), 'bottom-right');

  /* ── Légende interactive ── */
  map.on('load', () => {
    const el = document.getElementById('legend');
    GROUPS.forEach(g => {
      const row = document.createElement('div');
      row.className = 'legend-row';
      const cls = g.type === 'fill' ? 'swatch fill' : 'swatch';
      row.innerHTML = `<div class="${cls}" style="background:${g.color}"></div><span>${g.label}</span>`;
      let on = true;
      row.onclick = () => {
        on = !on;
        row.classList.toggle('off', !on);
        const v = on ? 'visible' : 'none';
        g.layers.forEach(id => { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', v); });
      };
      el.appendChild(row);
    });
  });
}
</script>
</body>
</html>
